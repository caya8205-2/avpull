name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install

      - name: Build binary
        run: bun run build

      - name: Copy ffmpeg
        run: node scripts/copy-ffmpeg.js

      - name: Verify artifacts
        run: |
          if (!(Test-Path dist/avpull.exe)) { exit 1 }
          if (!(Test-Path dist/ffmpeg.exe)) { exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: avpull-windows
          path: dist/
