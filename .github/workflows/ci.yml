name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Check build
        run: bun run build
  
  build-artifacts:
    name: Build Artifacts Check
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build and verify
        run: |
          bun run build
          node scripts/copy-ffmpeg.js
          if (!(Test-Path dist/avpull.exe)) { throw "avpull.exe not found" }
          if (!(Test-Path dist/ffmpeg.exe)) { throw "ffmpeg.exe not found" }
        shell: pwsh
