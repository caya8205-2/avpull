name: Build and Release

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
      
      - name: Check if release exists
        id: check_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          
          try {
            gh api "repos/${{ github.repository }}/releases/tags/v$version" 2>&1 | Out-Null
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release v$version already exists. Skipping."
          } catch {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release v$version not found. Will create."
          }
      
      - name: Skip build if release exists
        if: steps.check_release.outputs.exists == 'true'
        run: echo "Release already exists. Skipping build."
      
      - name: Install dependencies
        if: steps.check_release.outputs.exists == 'false'
        run: bun install
      
      - name: Build binary
        if: steps.check_release.outputs.exists == 'false'
        run: bun run build
      
      - name: Copy ffmpeg to dist
        if: steps.check_release.outputs.exists == 'false'
        run: node scripts/copy-ffmpeg.js
      
      - name: Upload build artifacts
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: avpull-windows
          path: |
            dist/avpull.exe
            dist/ffmpeg.exe
            dist/install.ps1
          retention-days: 30
      
      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/avpull.exe
            dist/ffmpeg.exe
            dist/install.ps1
      
      - name: Trigger npm publish
        if: steps.check_release.outputs.exists == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-created
          client-payload: '{"version": "v${{ steps.version.outputs.version }}"}'
  
  deploy-pages:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload landing page
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
