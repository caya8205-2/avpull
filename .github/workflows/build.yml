name: Build and Release

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
      
      - name: Check if release exists
        id: check_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          
          $response = gh api "repos/${{ github.repository }}/releases/tags/v$version" 2>&1
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release v$version already exists. Skipping."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release v$version not found. Will create."
          }
          exit 0
      
      - name: Skip build if release exists
        if: steps.check_release.outputs.exists == 'true'
        run: echo "Release already exists. Skipping build."
      
      - name: Install dependencies
        if: steps.check_release.outputs.exists == 'false'
        run: bun install
      
      - name: Build binary
        if: steps.check_release.outputs.exists == 'false'
        run: bun run build
      
      - name: Copy ffmpeg to dist
        if: steps.check_release.outputs.exists == 'false'
        shell: pwsh
        run: |
          node scripts/copy-ffmpeg.js
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to copy ffmpeg"
            exit 1
          }
      
      - name: Upload build artifacts
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: avpull-windows
          path: |
            dist/avpull.exe
            dist/ffmpeg.exe
            dist/install.ps1
          retention-days: 30
      
      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          gh release create "v$version" `
            dist/avpull.exe `
            dist/ffmpeg.exe `
            dist/install.ps1 `
            --title "v$version" `
            --generate-notes
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create release"
            exit 1
          }
      
      - name: Trigger npm publish
        if: steps.check_release.outputs.exists == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-created
          client-payload: '{"version": "v${{ steps.version.outputs.version }}"}'
  

