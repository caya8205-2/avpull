name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Binary
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build binary
        run: bun run build
      
      - name: Copy ffmpeg to dist
        run: node scripts/copy-ffmpeg.js
      
      - name: Check if release exists
        id: check_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view "$tag" --json tagName 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag not found."
          }
          exit 0
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avpull-windows
          path: |
            dist/avpull.exe
            dist/ffmpeg.exe
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && steps.check_release.outputs.exists == 'false'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/avpull.exe
            dist/ffmpeg.exe
            dist/install.ps1
      
      - name: Trigger npm publish
        if: startsWith(github.ref, 'refs/tags/') && steps.create_release.outcome == 'success'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-created
          client-payload: '{"version": "${{ github.ref_name }}"}'
  
  deploy-pages:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload landing page
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
